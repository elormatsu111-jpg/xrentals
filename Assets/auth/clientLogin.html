<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xrentals - Sign In</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
        integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA=="
        crossorigin="anonymous" />
    <link rel="stylesheet" href="../../assets/CSS/login.css">
</head>
<body>
    <section class="container">
      <div class="image-section">
        <div class="image-wrapper">
          <img src="../../assets/Images/logo.jpg" alt="House">
        </div>
        <div class="content-container">
        <h1>X<span>rentals</span></h1>
        <h1 class="section-heading">The Easiest Method To Find a <span>House</span></h1>
        <p class="section-paragraph">Discover your dream home with zero stress. Smart search, verified listings, and expert guidance all in one place.</p>
        </div>
      </div>
      <div class="form-section">
        <div class="form-wrapper">
          <div class="logo-container">
            <a href="#" class="logo-container">
              <img src="../../Assets/Images/house-logo.png" alt="Logo">
            </a>
          </div>
          <h2>Welcome Back! 👋🏻</h2>
          <p>Sign in to access your Xrentals account.</p>
          <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>
          </form>
          <div class="remember-forgot">
            <div class="remember-me">
              <input type="checkbox" value="remember-me" id="remember-me">
              <label for="remember-me">Remember me on this device</label>
            </div>
            <a href="#">Forgot password?</a>
          </div>
          <button type="submit" class="login-btn">Sign In</button>
          <div class="or-divider">or</div>
          <button class="link-signin">
            <object data="../../Assets/Images/google.svg"></object>
            <span>Sign in with Google</span>
          </button>
          <button class="link-signin">
            <object data="../../Assets/Images/apple.svg"></object>
            <span>Sign in with Apple</span>
          </button>
          <div class="signup-link">Don't have an account? <a href="#">Sign Up</a></div>
          <div class="auth-back">
                <a href=""><i class="fas fa-arrow-left"></i>  Back to Home</a>
          </div>
        </div>
      </div>
    </section>

    <!-- JAVASCRIPT -->
    <script>
        let users = JSON.parse(localStorage.getItem('users')) || [];

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');

            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                showAlert(alertDiv, 'Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    if (user.userType === 'admin') {
                        window.location.href = 'adminDashboard.html';
                    } else {
                        window.location.href = 'clientDashboard.html';
                    }
                }, 1500);
            } else {
                showAlert(alertDiv, 'Invalid email or password. Please try again.', 'danger');
            }
        }

        function showAlert(element, message, type) {
            element.textContent = message;
            element.className = 'alert show';
            if (type === 'danger') {
                element.classList.add('alert-danger');
            } else {
                element.classList.add('alert-success');
            }
        }
    </script>
</body>
</html>
