<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xrentals - Add a Property</title>
    <link rel="stylesheet" href="../../Assets/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
        integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA=="
        crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/property-form.css">
    <script>
        window.XRENTALS_LOGIN_PAGE = '../auth/propertyOwnerLogin.html';
        window.XRENTALS_REQUIRED_ROLE = 'owner';
    </script>
</head>
<body>
    <header class="dash-topbar">
        <div class="dash-logo">X<span>rentals</span></div>
        <div class="dash-user">
            <span>Signed in as <strong data-user-firstname>...</strong></span>
            <button class="dash-logout-btn" data-logout>Log out</button>
        </div>
    </header>

    <main class="dash-wrapper">
        <div class="dash-welcome">
            <a class="back-link" href="propertyOwnerDashboard.html"><i class="fas fa-arrow-left"></i> Back to dashboard</a>
            <h1>List a New Property</h1>
            <p>Fill in the details below. Fields marked * are required.</p>
        </div>

        <div id="formMessage" class="form-message" role="alert"></div>

        <form id="propertyForm" class="property-form" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" maxlength="150" placeholder="e.g. Ocean Breeze Villa" required>
                </div>
                <div class="form-group">
                    <label for="propertyType">Property Type *</label>
                    <select id="propertyType" name="property_type" required>
                        <option value="">Select type</option>
                        <option value="Apartment">Apartment</option>
                        <option value="House">House</option>
                        <option value="Villa">Villa</option>
                        <option value="Studio">Studio</option>
                        <option value="Cottage">Cottage</option>
                        <option value="Mansion">Mansion</option>
                        <option value="Townhouse">Townhouse</option>
                        <option value="Land">Land</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" rows="5" minlength="20" maxlength="5000" placeholder="Describe the property, its features, and its surroundings..." required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="listingType">Listing Type *</label>
                    <select id="listingType" name="listing_type" required>
                        <option value="rent">For Rent</option>
                        <option value="sale">For Sale</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="price">Price (GHS) *</label>
                    <input type="number" id="price" name="price" min="1" step="0.01" placeholder="e.g. 950000" required>
                </div>
            </div>

            <div class="form-row form-row-3">
                <div class="form-group">
                    <label for="bedrooms">Bedrooms *</label>
                    <input type="number" id="bedrooms" name="bedrooms" min="0" max="50" value="0" required>
                </div>
                <div class="form-group">
                    <label for="bathrooms">Bathrooms *</label>
                    <input type="number" id="bathrooms" name="bathrooms" min="0" max="50" value="0" required>
                </div>
                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" maxlength="100" placeholder="e.g. Koforidua" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address *</label>
                <input type="text" id="address" name="address" maxlength="255" placeholder="Street / area details" required>
            </div>

            <div class="form-group">
                <label for="images">Photos (up to 8, JPG/PNG/WEBP, 5MB each)</label>
                <input type="file" id="images" name="images" accept="image/jpeg,image/png,image/webp" multiple>
                <div id="imagePreview" class="image-preview"></div>
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn" class="dash-cta">Publish Listing</button>
            </div>
        </form>
    </main>

    <!-- <script src="../js/auth-guard.js"></script> -->
    <script src="../js/add-property.js"></script>
</body>
</html>
